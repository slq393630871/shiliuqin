<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>常州高一英语 · 核心知识点+练习</title>
<style>
  :root {
    --bg: #f5f0eb; --card: #ffffff; --text: #2c2416; --sub: #6b5e4a;
    --primary: #4a90d9; --accent: #e8734a; --success: #5a9e6f;
    --border: #e8e0d5; --shadow: 0 2px 12px rgba(44,36,22,0.07);
    --tab-bg: #ffffff; --highlight: #fef9e7; --tag-bg: #eef4fb;
    --tag-text: #4a90d9; --wrong: #fef0eb; --correct-bg: #eef7f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1815; --card: #252320; --text: #e8e0d5; --sub: #b0a590;
      --primary: #6db3f2; --accent: #f08a60; --success: #7ab88a;
      --border: #3d3830; --shadow: 0 2px 12px rgba(0,0,0,0.25);
      --tab-bg: #1f1d19; --highlight: #2a2618; --tag-bg: #1e2a38;
      --tag-text: #6db3f2; --wrong: #2a1a15; --correct-bg: #1a2a1f;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; scroll-behavior:smooth; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding-bottom: 90px; line-height: 1.65;
    -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;
  }

  .header {
    background: var(--card); padding: 12px 18px; position: sticky; top:0; z-index:100;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
  }
  .header .logo { font-size:1.05rem; font-weight:700; flex:1; }
  .header .logo span { color:var(--accent); }
  .streak { font-size:0.75rem; color:var(--sub); background:var(--tag-bg); padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .streak b { color:var(--accent); }

  .stats-row { display:flex; gap:8px; padding:14px 14px 4px; overflow-x:auto; }
  .stats-row::-webkit-scrollbar { display:none; }
  .stat-card { flex:1; min-width:80px; background:var(--card); border-radius:12px; padding:10px 8px; text-align:center; box-shadow:var(--shadow); }
  .stat-card .num { font-size:1.3rem; font-weight:700; color:var(--primary); }
  .stat-card .lbl { font-size:0.68rem; color:var(--sub); margin-top:2px; }

  /* ── 模块导航 ── */
  .module-nav { padding:12px 14px; }
  .module-nav summary { font-size:0.9rem; font-weight:700; color:var(--primary); cursor:pointer; padding:8px 0; }
  .module-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .mod-btn { padding:6px 13px; border-radius:16px; font-size:0.75rem; font-weight:600; border:1.5px solid var(--border); background:var(--card); color:var(--sub); cursor:pointer; transition:all 0.15s; }
  .mod-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .mod-btn.done { border-color:var(--success); color:var(--success); }
  .mod-btn.done::after { content:' ✓'; }

  /* ── 知识点内容区 ── */
  .kp-section { display:none; padding:0 14px 20px; }
  .kp-section.active { display:block; }

  .kp-card {
    background:var(--card); border-radius:16px; padding:18px;
    box-shadow:var(--shadow); margin-bottom:14px;
  }
  .kp-card .kp-tag {
    display:inline-block; font-size:0.7rem; padding:3px 10px;
    border-radius:10px; margin-bottom:8px; font-weight:600;
  }
  .kp-tag.grammar { background:#fef0eb; color:#e8734a; }
  .kp-tag.vocab { background:#eef7f0; color:#5a9e6f; }
  .kp-tag.reading { background:#eef4fb; color:#4a90d9; }
  .kp-tag.writing { background:#f5eeff; color:#7c5ce7; }

  .kp-card .kp-title { font-size:1rem; font-weight:700; margin-bottom:10px; }
  .kp-card .kp-desc { font-size:0.82rem; color:var(--sub); margin-bottom:12px; line-height:1.7; }
  .kp-card .kp-rule {
    font-size:0.84rem; padding:12px 14px; background:var(--highlight);
    border-radius:10px; margin-bottom:12px; line-height:1.9;
  }
  .kp-card .kp-rule b { color:var(--accent); }
  .kp-card .kp-example {
    font-size:0.8rem; color:var(--sub); padding-left:14px;
    border-left:3px solid var(--primary); margin-bottom:14px; line-height:1.7;
  }

  /* 练习题 */
  .exercise { margin-top:14px; border-top:1px dashed var(--border); padding-top:14px; }
  .exercise .ex-title { font-size:0.88rem; font-weight:700; margin-bottom:10px; }
  .ex-item { margin-bottom:14px; }
  .ex-item .ex-q { font-size:0.85rem; font-weight:600; margin-bottom:6px; }
  .ex-item .ex-opts { display:flex; flex-direction:column; gap:5px; }
  .ex-opt {
    padding:9px 12px; border-radius:10px; border:1.5px solid var(--border);
    background:var(--card); font-size:0.82rem; cursor:pointer; transition:all 0.12s;
  }
  .ex-opt:active { transform:scale(0.98); }
  .ex-opt.sel { border-color:var(--primary); background:var(--tag-bg); font-weight:600; }
  .ex-opt.corr { border-color:var(--success); background:var(--correct-bg); }
  .ex-opt.wrng { border-color:var(--accent); background:var(--wrong); }
  .ex-feedback { font-size:0.78rem; margin-top:6px; padding:8px 10px; border-radius:8px; display:none; }
  .ex-feedback.show { display:block; }
  .ex-feedback.ok { background:var(--correct-bg); color:var(--success); }
  .ex-feedback.no { background:var(--wrong); color:var(--accent); }

  /* 填空输入 */
  .fill-input {
    width:100%; padding:10px 12px; border:1.5px solid var(--border);
    border-radius:10px; font-size:0.85rem; font-family:inherit;
    background:var(--bg); color:var(--text);
  }
  .fill-input:focus { outline:none; border-color:var(--primary); }

  .btn {
    display:inline-block; padding:10px 22px; border-radius:10px;
    font-size:0.83rem; font-weight:600; border:none; cursor:pointer;
    margin:4px 5px 0 0; transition:all 0.12s;
  }
  .btn:active { transform:scale(0.96); }
  .btn-pri { background:var(--primary); color:#fff; }
  .btn-out { background:var(--card); color:var(--primary); border:1.5px solid var(--primary); }
  .btn-gray { background:var(--border); color:var(--text); }

  .toast {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:#333; color:#fff; padding:10px 24px; border-radius:20px;
    font-size:0.82rem; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .toast.show { opacity:1; }

  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; background:var(--tab-bg);
    box-shadow:0 -2px 12px rgba(0,0,0,0.08); display:flex;
    justify-content:space-around; padding:8px 0 12px; z-index:100;
  }
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .bottom-nav { padding-bottom:calc(12px + env(safe-area-inset-bottom)); }
  }
  .nav-item {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:none; border:none; cursor:pointer; color:var(--sub);
    font-size:0.66rem; padding:4px 10px; transition:color 0.2s;
  }
  .nav-item .icon { font-size:1.2rem; }
  .nav-item.active { color:var(--primary); font-weight:600; }

  .progress-bar { height:5px; background:var(--border); border-radius:3px; margin:6px 0 12px; overflow:hidden; }
  .progress-bar .fill { height:100%; background:var(--primary); border-radius:3px; transition:width 0.4s; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header class="header">
  <div class="logo">📖 常州高一·<span>核心知识点</span></div>
  <div class="streak">🔥 连续 <b id="streakDays">0</b> 天</div>
</header>

<div class="stats-row">
  <div class="stat-card"><div class="num" id="statDone">0</div><div class="lbl">✅ 已学知识点</div></div>
  <div class="stat-card"><div class="num" id="statEx">0</div><div class="lbl">📝 完成练习</div></div>
  <div class="stat-card"><div class="num" id="statScore">0%</div><div class="lbl">🎯 练习正确率</div></div>
</div>

<!-- 单元导航 -->
<div class="module-nav">
  <details open>
    <summary>📚 模块导航（点击展开/收起）</summary>
    <div class="module-list" id="moduleList"></div>
  </details>
</div>

<!-- 知识点内容 -->
<div id="kpContainer"></div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-kp" onclick="switchView('kp')">
    <span class="icon">🎯</span> 知识点
  </button>
  <button class="nav-item" id="nav-summary" onclick="switchView('summary')">
    <span class="icon">📊</span> 学习总览
  </button>
</nav>

<script>
// ==================== 核心知识点数据 ====================
// 按译林版牛津高中英语模块顺序整理

const knowledgePoints = [
  // ========== 模块一 Unit 1: School Life ==========
  {
    id: 'm1u1-1',
    module: '模块一',
    unit: 'Unit 1',
    topic: '校园生活',
    tag: 'grammar',
    tagText: '语法',
    title: '定语从句（一）：关系代词 who / whom / which / that',
    desc: '定语从句是高一最重要的语法之一，用来修饰名词或代词。本课学习关系代词的基本用法。',
    rule: `<b>📐 结构：</b>先行词 + <b>关系代词</b> + 从句<br><br>
<b>🔹 who</b> — 指<b>人</b>，在从句中作<b>主语</b><br>
&nbsp;&nbsp;The girl <b>who</b> sits next to me is from Changzhou.<br>
<b>🔹 whom</b> — 指<b>人</b>，在从句中作<b>宾语</b>（口语中常省略或用who代替）<br>
&nbsp;&nbsp;The boy <b>whom</b> you met is my classmate.<br>
<b>🔹 which</b> — 指<b>物</b>，作主语或宾语<br>
&nbsp;&nbsp;The book <b>which</b> is on the desk belongs to me.<br>
<b>🔹 that</b> — 指<b>人或物</b>，最万能，但不能用于非限制性定语从句<br>
&nbsp;&nbsp;This is the best film <b>that</b> I have ever seen.<br><br>
⚠️ <b>只能用 that 的情况：</b>先行词被最高级、序数词、all/any/every/no等修饰时`,
    example: 'The teacher who taught us English is now in America. 那位教过我们英语的老师现在在美国。',
    exercises: [
      { type:'choice', q:'The man ___ is standing at the school gate is our head teacher.', opts:['A. who','B. which','C. whom','D. what'], ans:0, hint:'指人，在从句中作主语 → 用 who' },
      { type:'choice', q:'This is the most interesting book ___ I have ever read.', opts:['A. which','B. that','C. who','D. what'], ans:1, hint:'先行词被最高级 most interesting 修饰 → 只能用 that' },
      { type:'choice', q:'The girl ___ you talked to just now is my deskmate.', opts:['A. who','B. whom','C. which','D. A and B'], ans:3, hint:'指人，作宾语 → who/whom 都可以' },
      { type:'fill', q:'用 who / which / that 填空：The classroom ___ is on the third floor is very bright.', ans:'which', hint:'指物 classroom → which/that 都可以' },
    ]
  },
  {
    id: 'm1u1-2',
    module: '模块一',
    unit: 'Unit 1',
    topic: '校园生活',
    tag: 'vocab',
    tagText: '词汇',
    title: '校园生活核心词汇 · School Life',
    desc: '以下词汇是谈论学校生活的必备词汇，常出现在阅读和写作中。',
    rule: `<b>📝 必会词汇：</b><br>
• <b>attend</b> v. 参加；出席 → attend classes / attend a meeting<br>
• <b>earn</b> v. 获得；赚取 → earn respect / earn money<br>
• <b>respect</b> n.&v. 尊重 → show respect for... / respect others<br>
• <b>achieve</b> v. 达到；取得 → achieve one's goal / achieve success<br>
• <b>challenging</b> adj. 有挑战性的 → a challenging task<br>
• <b>extra</b> adj. 额外的 → extra practice / extra homework<br>
• <b>average</b> adj.&n. 平均的；平均数 → on average / above average<br>
• <b>experience</b> n.&v. 经验；经历 → gain experience / an unforgettable experience<br>
• <b>exchange</b> n.&v. 交换；交流 → exchange student / cultural exchange<br>
• <b>former</b> adj. 以前的 → former school / former classmate<br><br>
<b>🔑 易混词辨析：</b>attend（正式参加） / take part in（参与活动） / join（加入组织）`,
    example: 'I am happy to attend such a challenging course and hope to achieve good results. 我很高兴参加这么有挑战性的课程，希望能取得好成绩。',
    exercises: [
      { type:'choice', q:'She decided to ___ the school English club to improve her speaking skills.', opts:['A. attend','B. join','C. take part in','D. enter'], ans:1, hint:'join + 组织/团体；attend + 会议/课程；take part in + 活动' },
      { type:'choice', q:'Studying abroad is a(n) ___ experience that I will never forget.', opts:['A. challenging','B. average','C. unforgettable','D. extra'], ans:2, hint:'unforgettable = 难忘的，与 "never forget" 呼应' },
      { type:'fill', q:'用 respect 的适当形式填空：We should ___（尊重）our teachers and classmates.', ans:'respect', hint:'should + 动词原形' },
    ]
  },

  // ========== 模块一 Unit 2: Growing Pains ==========
  {
    id: 'm1u2-1',
    module: '模块一',
    unit: 'Unit 2',
    topic: '成长的烦恼',
    tag: 'grammar',
    tagText: '语法',
    title: '定语从句（二）：介词 + which/whom',
    desc: '当关系代词在从句中作介词宾语时，介词可以提前到关系代词之前，形成"介词 + which/whom"结构。这是高一难点！',
    rule: `<b>📐 结构：</b>先行词 + <b>介词 + which/whom</b> + 从句<br><br>
<b>🔹 正式用法（介词提前）：</b><br>
&nbsp;&nbsp;The school <b>in which</b> I study is very old. = The school which I study <b>in</b> is very old.<br>
&nbsp;&nbsp;The teacher <b>from whom</b> I learned a lot is Ms. Li. = The teacher whom I learned a lot <b>from</b> is Ms. Li.<br><br>
<b>⚠️ 关键规则：</b><br>
① 介词提前后，<b>只能用 which/whom，不能用 that/who！</b><br>
② 含有介词的短语动词（look after, take care of等）介词<b>不提前</b><br>
③ 关系代词作宾语时<b>不能省略</b>（介词提前时）<br><br>
<b>🔹 常用介词搭配：</b>in which, for which, from whom, to whom, about which, with whom`,
    example: 'The problem about which we argued was finally solved. 我们争论的那个问题终于解决了。',
    exercises: [
      { type:'choice', q:'The house ___ I was born has been pulled down.', opts:['A. in that','B. in which','C. which','D. in where'], ans:1, hint:'be born in... → 介词 in + which；in that 语法错误' },
      { type:'choice', q:'This is the boy ___ I played tennis yesterday.', opts:['A. with whom','B. with who','C. whom','D. with that'], ans:0, hint:'play tennis with sb → 介词提前只能用 whom' },
      { type:'choice', q:'The baby ___ she is looking after is very cute.', opts:['A. after whom','B. whom','C. after which','D. which'], ans:1, hint:'look after 是短语动词，介词不提前' },
    ]
  },
  {
    id: 'm1u2-2',
    module: '模块一',
    unit: 'Unit 2',
    topic: '成长的烦恼',
    tag: 'grammar',
    tagText: '语法',
    title: '现在完成时 vs 一般过去时',
    desc: '这是高一最易混淆的时态对比！核心区别：现在完成时连接现在，一般过去时只讲过去。',
    rule: `<b>🔹 现在完成时 (have/has + done)：</b>强调对<b>现在的影响</b>或<b>持续至今</b><br>
&nbsp;&nbsp;I <b>have lived</b> in Changzhou for 16 years.（现在还住在常州）<br>
&nbsp;&nbsp;She <b>has finished</b> her homework.（现在可以玩了）<br><br>
<b>🔹 一般过去时 (did)：</b>单纯描述<b>过去发生</b>的动作<br>
&nbsp;&nbsp;I <b>lived</b> in Nanjing 5 years ago.（现在不住了）<br>
&nbsp;&nbsp;She <b>finished</b> her homework last night.（只说昨晚的事）<br><br>
<b>🔑 关键标志词：</b><br>
<b>现在完成时：</b>already, yet, ever, never, just, since, for+时间段, so far, recently<br>
<b>一般过去时：</b>yesterday, ago, last week, in 2025, just now<br><br>
<b>⚠️ since 从句用一般过去时，主句用现在完成时：</b><br>
&nbsp;&nbsp;I <b>have known</b> him since he <b>moved</b> here.`,
    example: 'I have studied English for 7 years.（现在还在学） vs. I studied English yesterday.（只说昨天学了）',
    exercises: [
      { type:'choice', q:'— ___ you ___ the film yet? — Yes, I ___ it last Sunday.', opts:['A. Did...see; saw','B. Have...seen; saw','C. Have...seen; have seen','D. Did...see; have seen'], ans:1, hint:'yet → 现在完成时；last Sunday → 一般过去时' },
      { type:'choice', q:'Mr. Li ___ in this school since 2020.', opts:['A. teaches','B. taught','C. has taught','D. is teaching'], ans:2, hint:'since 2020 → 现在完成时，表示从2020年持续至今' },
      { type:'fill', q:'用括号内动词的适当形式填空：So far, the boy ___ (learn) over 500 English words.', ans:'has learned', hint:'so far → 现在完成时标志；主语 the boy 是单数 → has learned' },
    ]
  },
  {
    id: 'm1u2-3',
    module: '模块一',
    unit: 'Unit 2',
    topic: '成长的烦恼',
    tag: 'vocab',
    tagText: '词汇',
    title: '情感表达核心词汇 · Growing Pains',
    desc: '描述成长烦恼和家庭关系的高频词汇，阅读理解中经常出现。',
    rule: `<b>📝 必会词汇：</b><br>
• <b>argument</b> n. 争论 → have an argument with sb<br>
• <b>upset</b> adj. 难过的；心烦的 → feel upset about...<br>
• <b>trust</b> v.&n. 信任 → trust sb / have trust in...<br>
• <b>limit</b> v.&n. 限制 → set a limit / be limited to...<br>
• <b>balance</b> n.&v. 平衡 → keep a balance / balance A and B<br>
• <b>independent</b> adj. 独立的 → be independent of...<br>
• <b>patience</b> n. 耐心 → have patience with...<br>
• <b>communicate</b> v. 沟通 → communicate with sb<br>
• <b>solve</b> v. 解决 → solve the problem<br>
• <b>misunderstand</b> v. 误解 → be misunderstood by...`,
    example: 'Good communication helps solve misunderstandings between parents and children. 良好的沟通有助于解决父母和孩子之间的误解。',
    exercises: [
      { type:'choice', q:'Parents should have more ___ with their teenage children.', opts:['A. patience','B. argument','C. limit','D. balance'], ans:0, hint:'have patience with = 对...有耐心' },
      { type:'fill', q:'用括号内单词的适当形式填空：Learning to be ___ (independence) is an important part of growing up.', ans:'independent', hint:'be + adj. 作表语 → independent' },
    ]
  },

  // ========== 模块一 Unit 3: Looking Good, Feeling Good ==========
  {
    id: 'm1u3-1',
    module: '模块一',
    unit: 'Unit 3',
    topic: '外表与健康',
    tag: 'grammar',
    tagText: '语法',
    title: '反意疑问句 (Tag Questions)',
    desc: '反意疑问句是日常对话中常用结构，表示"是不是？对吧？"考试经常出！',
    rule: `<b>📐 结构：</b>陈述句 + 简短疑问<br><br>
<b>🔹 基本规则：前肯后否，前否后肯</b><br>
&nbsp;&nbsp;You like English, <b>don't you?</b>（前肯定 → 后否定）<br>
&nbsp;&nbsp;You don't smoke, <b>do you?</b>（前否定 → 后肯定）<br><br>
<b>🔹 特殊考点（必考！）：</b><br>
① <b>I am... → aren't I?</b>（不说 am I not?）<br>
&nbsp;&nbsp;I'm right, <b>aren't I?</b><br>
② 祈使句 → <b>will you? / won't you?</b><br>
&nbsp;&nbsp;Open the door, <b>will you?</b><br>
③ <b>Let's... → shall we?</b> / <b>Let us... → will you?</b><br>
&nbsp;&nbsp;Let's go, <b>shall we?</b> / Let us go, <b>will you?</b><br>
④ 含否定词(never, hardly, seldom等) → 看作否定，疑问部分用肯定<br>
&nbsp;&nbsp;He never smokes, <b>does he?</b><br>

(function recordVisit() {

    localStorage.setItem('gaoyi_last_visit', today);
  }
  document.getElementById('streakDays').textContent = streakDays;
})();

function saveAll() {
  localStorage.setItem('gaoyi_kp_done', JSON.stringify([...completedKP]));
  localStorage.setItem('gaoyi_kp_answers', JSON.stringify(kpAnswers));
  localStorage.setItem('gaoyi_ex_correct', totalCorrectEx);
  localStorage.setItem('gaoyi_ex_attempts', totalAttemptsEx);
}

function updateStats() {
  document.getElementById('statDone').textContent = completedKP.size;
  document.getElementById('statEx').textContent = totalAttemptsEx;
  const pct = totalAttemptsEx > 0 ? Math.round(totalCorrectEx / totalAttemptsEx * 100) : 0;
  document.getElementById('statScore').textContent = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ==================== 模块导航 ====================
function buildModuleNav() {
  const modules = [...new Set(knowledgePoints.map(k => k.module))];
  const list = document.getElementById('moduleList');
  let html = `<button class="mod-btn ${currentModule==='all'?'active':''}" onclick="filterModule('all')">📚 全部</button>`;
  modules.forEach(m => {
    const mKps = knowledgePoints.filter(k => k.module === m);
    const mDone = mKps.every(k => completedKP.has(k.id));
    html += `<button class="mod-btn${currentModule===m?' active':''}${mDone?' done':''}" onclick="filterModule('${m}')">${m}</button>`;
  });
  list.innerHTML = html;
}

function filterModule(mod) {
  currentModule = mod;
  buildModuleNav();
  renderAllKP();
}

// ==================== 渲染知识点 ====================
function renderAllKP() {
  const container = document.getElementById('kpContainer');
  let filtered = knowledgePoints;
  if (currentModule !== 'all') {
    filtered = knowledgePoints.filter(k => k.module === currentModule);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub);">该模块暂无知识点</div>';
    return;
  }

  let html = '';
  let lastUnit = '';

  filtered.forEach((kp, idx) => {
    // 单元标题
    if (kp.unit !== lastUnit) {
      const uKps = filtered.filter(k => k.unit === kp.unit);
      const uDone = uKps.every(k => completedKP.has(k.id));
      html += `<div style="font-size:0.9rem;font-weight:700;color:var(--primary);padding:14px 0 6px 4px;display:flex;align-items:center;gap:6px;">
        ${uDone ? '✅' : '📘'} ${kp.module} · ${kp.unit}：${kp.topic}
      </div>`;
      lastUnit = kp.unit;
    }

    const done = completedKP.has(kp.id);
    const tagCls = kp.tag;
    const tagTxt = kp.tagText;

    html += `<div class="kp-card" id="kp-${kp.id}" style="${done ? 'border-left:4px solid var(--success);' : ''}">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="kp-tag ${tagCls}">${tagTxt}</span>
        <span style="font-size:0.72rem;color:var(--sub);">${kp.module} · ${kp.unit}</span>
        ${done ? '<span style="font-size:0.75rem;color:var(--success);font-weight:600;">✅ 已完成</span>' : ''}
      </div>
      <div class="kp-title">${idx+1}. ${kp.title}</div>
      <div class="kp-desc">${kp.desc}</div>
      <div class="kp-rule">${kp.rule}</div>
      <div class="kp-example">📌 <b>例句：</b>${kp.example}</div>

      <!-- 练习题 -->
      <div class="exercise">
        <div class="ex-title">📝 配套练习（共 ${kp.exercises.length} 题）</div>
        ${renderExercises(kp, done)}
        ${done ? '' : `<button class="btn btn-pri" onclick="checkAllExercises('${kp.id}')">✅ 提交本课练习</button>`}
        ${done ? `<button class="btn btn-out" onclick="resetKP('${kp.id}')">🔄 重新练习</button>` : ''}
      </div>
    </div>`;
  });

  container.innerHTML = html;
  buildModuleNav();
  updateStats();
}

function renderExercises(kp, done) {
  return kp.exercises.map((ex, ei) => {
    const exKey = `${kp.id}_${ei}`;
    const userAns = kpAnswers[exKey];
    const isCorrect = done && userAns !== undefined;
    let correctAns = null;

    if (done) {
      if (ex.type === 'choice') correctAns = ex.ans;
      else correctAns = ex.ans;
    }

    if (ex.type === 'choice') {
      return `<div class="ex-item">
        <div class="ex-q">${ei+1}. ${ex.q}</div>
        <div class="ex-opts">
          ${ex.opts.map((opt, oi) => {
            let cls = 'ex-opt';
            if (done) {
              if (oi === ex.ans) cls += ' corr';
              else if (userAns === oi && oi !== ex.ans) cls += ' wrng';
            } else if (userAns === oi) {
              cls += ' sel';
            }
            return `<div class="${cls}" onclick="${done ? '' : `selectExOpt('${kp.id}',${ei},${oi})`}">${opt}</div>`;
          }).join('')}
        </div>
        ${done ? `<div class="ex-feedback show ${userAns === ex.ans ? 'ok' : 'no'}">💡 ${userAns === ex.ans ? '✅ 回答正确！' : '❌ 正确答案是 ' + ex.opts[ex.ans] + '。'} ${ex.hint}</div>` : ''}
      </div>`;
    } else {
      // 填空题
      const userFill = kpAnswers[exKey] || '';
      const correct = ex.ans.toLowerCase().trim();
      const isFillCorrect = done && userFill.toLowerCase().trim() === correct;
      return `<div class="ex-item">
        <div class="ex-q">${ei+1}. ${ex.q}</div>
        <input class="fill-input" type="text" id="fill-${exKey}" value="${userFill}" placeholder="输入你的答案..."
          ${done ? 'disabled' : ''} onchange="saveFillAnswer('${kp.id}',${ei},this.value)">
        ${done ? `<div class="ex-feedback show ${isFillCorrect ? 'ok' : 'no'}">💡 ${isFillCorrect ? '✅ 回答正确！' : '❌ 正确答案是：' + correct + '。'} ${ex.hint}</div>` : ''}
      </div>`;
    }
  }).join('');
}

function selectExOpt(kpId, ei, oi) {
  const exKey = `${kpId}_${ei}`;
  kpAnswers[exKey] = oi;
  saveAll();
  renderAllKP();
  // 滚动回当前位置
  const el = document.getElementById('kp-' + kpId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function saveFillAnswer(kpId, ei, val) {
  const exKey = `${kpId}_${ei}`;
  kpAnswers[exKey] = val;
  saveAll();
}

function checkAllExercises(kpId) {
  const kp = knowledgePoints.find(k => k.id === kpId);
  if (!kp) return;

  // 检查是否都做了
  let allDone = true;
  kp.exercises.forEach((ex, ei) => {
    const exKey = `${kpId}_${ei}`;
    const ans = kpAnswers[exKey];
    if (ans === undefined || (typeof ans === 'string' && ans.trim() === '')) {
      allDone = false;
    }
  });

  if (!allDone) {
    showToast('⚠️ 请先完成所有练习题哦~');
    return;
  }

  // 计分
  let correct = 0;
  kp.exercises.forEach((ex, ei) => {
    const exKey = `${kpId}_${ei}`;
    const userAns = kpAnswers[exKey];
    if (ex.type === 'choice') {
      if (userAns === ex.ans) correct++;
    } else {
      if (typeof userAns === 'string' && userAns.toLowerCase().trim() === ex.ans.toLowerCase().trim()) correct++;
    }
  });

  totalAttemptsEx += kp.exercises.length;
  totalCorrectEx += correct;
  completedKP.add(kpId);
  saveAll();
  updateStats();

  const pct = Math.round(correct / kp.exercises.length * 100);
  const emoji = pct === 100 ? '🌟' : pct >= 60 ? '👏' : '💪';
  showToast(`${emoji} 答对 ${correct}/${kp.exercises.length}！继续加油～`);

  renderAllKP();
  document.getElementById('kp-' + kpId).scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetKP(kpId) {
  const kp = knowledgePoints.find(k => k.id === kpId);
  if (!kp) return;
  completedKP.delete(kpId);
  kp.exercises.forEach((ex, ei) => {
    const exKey = `${kpId}_${ei}`;
    delete kpAnswers[exKey];
    if (ex.type === 'choice') {
      // 重新计算统计（回退）
    }
  });
  // 重新计算统计
  recalcStats();
  saveAll();
  updateStats();
  renderAllKP();
  document.getElementById('kp-' + kpId).scrollIntoView({ behavior: 'smooth', block: 'center' });
  showToast('🔄 已重置，重新挑战吧！');
}

function recalcStats() {
  totalCorrectEx = 0;
  totalAttemptsEx = 0;
  knowledgePoints.forEach(kp => {
    if (completedKP.has(kp.id)) {
      kp.exercises.forEach((ex, ei) => {
        const exKey = `${kp.id}_${ei}`;
        const userAns = kpAnswers[exKey];
        totalAttemptsEx++;
        if (ex.type === 'choice') {
          if (userAns === ex.ans) totalCorrectEx++;
        } else {
          if (typeof userAns === 'string' && userAns.toLowerCase().trim() === ex.ans.toLowerCase().trim()) totalCorrectEx++;
        }
      });
    }
  });
}

// ==================== 视图切换 ====================
function switchView(view) {
  currentView = view;
  document.getElementById('nav-kp').classList.toggle('active', view === 'kp');
  document.getElementById('nav-summary').classList.toggle('active', view === 'summary');

  if (view === 'kp') {
    document.getElementById('kpContainer').style.display = 'block';
    renderAllKP();
  } else {
    renderSummary();
  }
}

function renderSummary() {
  document.getElementById('kpContainer').style.display = 'block';

  const modules = [...new Set(knowledgePoints.map(k => k.module))];
  let html = '<div style="padding:0 0 20px;">';
  html += '<div style="font-size:1.1rem;font-weight:700;padding:16px 0 8px;">📊 学习总览</div>';

  modules.forEach(m => {
    const mKps = knowledgePoints.filter(k => k.module === m);
    const mDone = mKps.filter(k => completedKP.has(k.id)).length;
    html += `<div style="background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;">
      <div style="font-weight:700;margin-bottom:8px;">📘 ${m}（${mDone}/${mKps.length}）</div>
      <div class="progress-bar"><div class="fill" style="width:${Math.round(mDone/mKps.length*100)}%"></div></div>`;

    const units = [...new Set(mKps.map(k => k.unit))];
    units.forEach(u => {
      const uKps = mKps.filter(k => k.unit === u);
      const uDone = uKps.filter(k => completedKP.has(k.id)).length;
      html += `<div style="font-size:0.82rem;padding:6px 0;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);">
        <span>📖 ${u}：${uKps[0].topic}</span>
        <span style="color:${uDone===uKps.length?'var(--success)':'var(--sub)'};">${uDone}/${uKps.length} ✅</span>
      </div>`;
      uKps.forEach(k => {
        const d = completedKP.has(k.id);
        html += `<div style="font-size:0.76rem;color:var(--sub);padding:3px 0 3px 20px;">${d ? '✅' : '⬜'} ${k.title}</div>`;
      });
    });

    html += '</div>';
  });

  // 全局统计
  html += `<div style="background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;">
    <div style="font-weight:700;margin-bottom:8px;">🎯 全局统计</div>
    <div style="font-size:0.85rem;">完成知识点：<b>${completedKP.size}</b> / ${knowledgePoints.length}</div>
    <div style="font-size:0.85rem;">完成练习题：<b>${totalAttemptsEx}</b> 题</div>
    <div style="font-size:0.85rem;">正确率：<b>${totalAttemptsEx>0?Math.round(totalCorrectEx/totalAttemptsEx*100):0}%</b></div>
    <button class="btn btn-gray" style="margin-top:10px;" onclick="resetAll()">🗑️ 重置全部进度</button>
  </div>`;

  html += '</div>';
  document.getElementById('kpContainer').innerHTML = html;
}

function resetAll() {
  if (confirm('确定要清除所有学习进度吗？这个操作不可恢复哦！')) {
    completedKP.clear();
    kpAnswers = {};
    totalCorrectEx = 0;
    totalAttemptsEx = 0;
    saveAll();
    updateStats();
    renderAllKP();
    showToast('🔄 所有进度已重置');
  }
}

// ==================== 初始化 ====================
function init() {
  buildModuleNav();
  renderAllKP();
  updateStats();
}
init();
</script>
</body>
</html>
