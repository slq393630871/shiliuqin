<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码打开 · 高一英语学习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f0eb; min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: #fff; border-radius: 20px; padding: 36px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; max-width: 380px;
  }
  .card h2 { font-size: 1.3rem; margin-bottom: 6px; }
  .card .sub { color: #999; font-size: 0.85rem; margin-bottom: 20px; }
  .card img { width: 240px; height: 240px; border-radius: 12px; }
  .card .tip { margin-top: 16px; font-size: 0.78rem; color: #aaa; }
  .card .url {
    margin-top: 14px; font-size: 0.82rem; color: #4a90d9; background: #eef4fb;
    padding: 8px 16px; border-radius: 8px; word-break: break-all;
  }
</style>
</head>
<body>
<div class="card">
  <h2>📖 常州高一英语读写</h2>
  <div class="sub">用 iPhone 相机扫二维码打开</div>
  <img src="gaoyi-qrcode.png" alt="QR Code">
  <div class="url">http://192.168.1.75:8080/gaoyi-english.html</div>
  <div class="tip">💡 确保手机和电脑在同一 WiFi<br>二维码永久有效，随时可扫</div>
</div>
</body>
</html>
